services:
  - type: web
    name: student-swap-api
    runtime: python
    rootDir: student-swap/backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2
    envVars:
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: FLASK_ENV
        value: production
      - key: UPLOAD_FOLDER
        value: uploads
      - key: JWT_ACCESS_TOKEN_EXPIRES
        value: "604800"

  - type: web
    name: student-swap-frontend
    runtime: static
    rootDir: student-swap/frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false
